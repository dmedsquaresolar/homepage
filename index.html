<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Home Page</title>

  <style>
    :root{
      --yellow:#f6c10a;
      --cardRadius:18px;
      --shadow: 0 10px 26px rgba(0,0,0,.18);
      --shadowSoft: 0 8px 18px rgba(0,0,0,.14);
      --bg:#ffffff;
      --text:#0b1b2b;
    }

    body{
      margin:0;
      font-family: system-ui, Arial;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{
      max-width:420px;
      margin:auto;
      padding:16px;
    }

    .title img{
      width:180px;
      display:block;
      margin:auto;
    }

    .video-card{
      border-radius: var(--cardRadius);
      overflow:hidden;
      box-shadow: var(--shadowSoft);
      background:#000;
    }

    .video-frame{
      width:100%;
      height:230px;
    }

    .video-frame iframe{
      width:100%;
      height:100%;
      border:0;
    }

    .service-card{
      margin-top:16px;
      background:#000;
      color:#fff;
      border-radius: var(--cardRadius);
      padding:18px;
      position:relative;
    }

    .price{font-size:22px;font-weight:bold}

    .btn-group{
      position:absolute;
      right:16px;
      bottom:16px;
      display:flex;
      gap:10px;
    }

    .pill-btn{
      background: var(--yellow);
      padding:10px 14px;
      border-radius:999px;
      text-decoration:none;
      font-weight:bold;
      color:#000;
    }

    .estimate-card{
      margin-top:14px;
      background:#000;
      color:#fff;
      padding:16px;
      border-radius: var(--cardRadius);
      display:flex;
      justify-content:space-between;
      text-decoration:none;
    }

    .vuWrap{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.9);
      z-index:999;
    }

    .vuBox{
      background:#111;
      color:#fff;
      padding:20px;
      border-radius:20px;
      text-align:center;
    }

    .vuBtn{
      margin-top:10px;
      padding:12px;
      background:var(--yellow);
      border:none;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="versionUpdateModal" class="vuWrap">
  <div class="vuBox">
    <h3>New Version Available</h3>
    <p>Please update to continue</p>
    <button id="btnVersionUpdate" class="vuBtn">Update Now</button>
  </div>
</div>

<div id="appRoot" style="display:none;">
  <div class="wrap">

    <div class="title">
      <img src="logo.png">
    </div>

    <!-- ✅ UPDATED VIDEO -->
    <div class="video-card">
      <div class="video-frame">
        <iframe
          src="https://drive.google.com/file/d/1_92CXmZN3lm1Y2pzslYiSV0YJuOoXr5L/preview?autoplay=1&mute=1"
          allow="autoplay; fullscreen">
        </iframe>
      </div>
    </div>

    <div class="service-card">
      <h2>Solar Panel Cleaning Service</h2>
      <div>@ <span class="price">₹208*</span></div>

      <div class="btn-group">
        <a class="pill-btn" href="https://dmedsquaresolar.github.io/CustomersQuerys/" target="_blank">BOOK NOW</a>
        <a class="pill-btn" href="https://dmedsquaresolar.github.io/customertrack/" target="_blank">Track</a>
      </div>

      <div style="color:#f6c10a;margin-top:40px;font-weight:bold;">AMC AVAILABLE</div>
    </div>

    <a class="estimate-card" href="https://dmedsquaresolar.github.io/estimate/" target="_blank">
      <div>want to book later? <b style="color:#f6c10a;">Get Estimate</b></div>
      <div>›</div>
    </a>

  </div>
</div>

<script>
const VERSION_FILE = "version.json";
const VERSION_KEY = "site_version_seen";

function showApp(){
  document.getElementById("appRoot").style.display = "block";
}

function showUpdate(v){
  document.getElementById("versionUpdateModal").style.display = "flex";
  document.getElementById("btnVersionUpdate").onclick = function(){
    localStorage.setItem(VERSION_KEY, v);
    location.reload();
  }
}

async function checkVersion(){
  try{
    let r = await fetch(VERSION_FILE);
    let d = await r.json();
    let latest = d.version;
    let seen = localStorage.getItem(VERSION_KEY);

    if(!seen){
      localStorage.setItem(VERSION_KEY, latest);
      showApp();
    } else if(seen !== latest){
      showUpdate(latest);
    } else {
      showApp();
    }
  }catch{
    showApp();
  }
}

checkVersion();
</script>

</body>
</html>
